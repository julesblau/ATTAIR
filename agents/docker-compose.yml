# ATTAIRE Discord Bot — Docker Compose
# Usage:
#   docker compose -f agents/docker-compose.yml up -d
#   docker compose -f agents/docker-compose.yml logs -f
#   docker compose -f agents/docker-compose.yml down

services:
  bot:
    build:
      context: ..
      dockerfile: agents/Dockerfile
    container_name: attaire-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTED=true
      - REPO_ROOT=/app
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Persist git state across restarts
      - bot-data:/app/.git
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
