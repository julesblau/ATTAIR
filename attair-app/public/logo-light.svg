<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <!-- Light-theme logo: dark rect + light text, gold AI highlight, gold asterisk exponent on E -->
  <rect width="200" height="56" rx="4" fill="#1A1816"/>
  <text
    x="100"
    y="30"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Helvetica Neue', 'Inter', Helvetica, Arial, sans-serif"
    font-weight="700"
    font-size="44"
    letter-spacing="-2"
  ><tspan fill="#FAFAFA">ATT</tspan><tspan fill="#C9A96E">AI</tspan><tspan fill="#FAFAFA">RE</tspan></text>
  <text
    x="168"
    y="14"
    font-family="'Helvetica Neue', 'Inter', Helvetica, Arial, sans-serif"
    font-weight="700"
    font-size="16"
    fill="#C9A96E"
  >*</text>
</svg>